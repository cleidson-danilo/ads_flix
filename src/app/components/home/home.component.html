<ion-header>
  <ion-toolbar color="dark">
    <ion-title>🎬 ADS Flix</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Loading -->
  <div class="loading-container" *ngIf="isLoading">
    <ion-spinner name="crescent" color="danger"></ion-spinner>
    <p>Carregando filmes...</p>
  </div>

  <!-- Lista de filmes -->
  <ion-grid *ngIf="!isLoading">
    <ion-row>
      <ion-col size="6" *ngFor="let filme of filmes">
        <ion-card (click)="verDetalhes(filme.id)">
          <img [src]="getPoster(filme.poster_path)" [alt]="filme.title"/>
          <ion-card-header>
            <ion-card-title>{{ filme.title }}</ion-card-title>
            <ion-card-subtitle>
              <ion-icon name="star" color="warning"></ion-icon>
              {{ filme.vote_average | number:'1.1-1' }}
            </ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
